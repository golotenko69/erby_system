version: '3.8'

services:
  # 1. Сервис Django
  web:
    build: .
    container_name: django_web_app
    command: gunicorn django_erbu.wsgi:application --bind 0.0.0.0:8000 --workers 3
    dns:
      - 8.8.8.8
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on: [] # Больше не зависит от локальной db

  # 2. Сервис Веб-сервера Nginx
  nginx:
    image: nginx:latest
    container_name: django_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  static_volume: # Общая папка для статики между Django и Nginx
  media_volume:  # Общая папка для медиа-файловs